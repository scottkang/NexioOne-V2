name: Chore
description: 유지보수/운영/문서/리팩터링 작업
title: "[chore] "
labels:
  - type:chore
body:
  - type: textarea
    id: purpose
    attributes:
      label: 작업 목적
      placeholder: 왜 필요한 작업인지
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: 작업 항목
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: dropdown
    id: modules
    attributes:
      label: 영향 모듈
      multiple: true
      options:
        - my-console
        - my-console-backend
        - my-backend
        - docs
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: 검증 방법
      placeholder: 실행 명령 또는 확인 절차
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 비고
      description: 후속 이슈, 제약 사항 등을 적어주세요.
    validations:
      required: false
