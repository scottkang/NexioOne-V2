name: PIT CI

on:
  workflow_dispatch:
    inputs:
      module:
        description: Target module to run PIT against
        required: true
        default: all
        type: choice
        options:
          - all
          - my-console-backend
          - my-backend

permissions:
  contents: read

concurrency:
  group: pit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  my-console-backend:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == 'my-console-backend'
    name: my-console-backend pit
    runs-on:
      - self-hosted
      - macOS
    defaults:
      run:
        working-directory: my-console-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Run PIT
        run: mvn -q -Ppitest test-compile org.pitest:pitest-maven:mutationCoverage
      - name: Upload PIT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: my-console-backend-pit-report
          path: my-console-backend/target/pit-reports

  my-backend:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == 'my-backend'
    name: my-backend pit
    runs-on:
      - self-hosted
      - macOS
    defaults:
      run:
        working-directory: my-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Run PIT
        run: mvn -q -Ppitest test-compile org.pitest:pitest-maven:mutationCoverage
      - name: Upload PIT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: my-backend-pit-report
          path: my-backend/target/pit-reports
